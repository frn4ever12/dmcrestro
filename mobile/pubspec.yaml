name: nepal_restaurant_app
description: Nepal Restaurant Management Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Requests
  http: ^1.1.0
  dio: ^5.3.3
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Navigation
  go_router: ^12.1.1
  
  # UI Components
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # QR Code
  qr_flutter: ^4.1.0
  # mobile_scanner: ^3.5.5  # Temporarily disabled due to SDK compatibility
  
  # Charts
  fl_chart: ^0.65.0
  
  # Date & Time
  intl: ^0.18.1
  
  # Utilities
  logger: ^2.0.2+1
  equatable: ^2.0.5
  
  # Payment Gateways
  khalti: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
